{% extends "base.html" %}

{% block content %}

<div class="mb-4">
    <h2 class="fw-bold mb-1">
        {% if object %}Editar servicio{% else %}Nuevo servicio{% endif %}
    </h2>
    <p class="text-secondary mb-0">
        Complete los datos del servicio.
    </p>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    {{ form.nombre }}
                </div>

                <div class="col-md-3">
                    <label class="form-label">Duración en minutos</label>
                    {{ form.duracion }}
                </div>

                <div class="col-md-3">
                    <label class="form-label">Precio</label>
                    {{ form.precio }}
                </div>

                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    {{ form.descripcion }}
                </div>

                <div class="col-12">
                    <div class="form-check mt-2">
                        {{ form.activo }}
                        <label class="form-check-label">
                            Servicio activo
                        </label>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>

                <a href="{% url 'servicios:lista' %}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
