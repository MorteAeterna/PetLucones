{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión | Petlucones</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="login-card shadow-sm">
        <div class="brand-login">
            <div class="brand-logo mx-auto mb-3">P</div>
            <h1>Petlucones</h1>
            <p>Sistema de gestión para peluquería canina</p>
        </div>

        <div class="demo-access mb-4">
            <div class="fw-bold mb-2">Acceso de demostración</div>
            <div><strong>Usuario:</strong> user</div>
            <div><strong>Contraseña:</strong> user1234</div>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contraseña incorrectos.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Iniciar sesión
            </button>
        </form>
    </div>
</div>

</body>
</html>
