{% extends "base.html" %}

{% block content %}

<div class="mb-4">

<h2 class="fw-bold">

{% if object %}

Editar reserva

{% else %}

Nueva reserva

{% endif %}

</h2>

</div>

<div class="card shadow-sm border-0">

<div class="card-body">

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<div class="d-flex gap-2 mt-4">

<button class="btn btn-primary">

Guardar

</button>

<a href="{% url 'reservas:lista' %}" class="btn btn-outline-secondary">

Cancelar

</a>

</div>

</form>

</div>

</div>

{% endblock %}
